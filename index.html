<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Eid Hadiya 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Hind+Siliguri:wght@400;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#050505] text-white font-['Hind_Siliguri'] overflow-hidden">

    <section id="step-1" class="h-screen flex flex-col items-center justify-center p-6 text-center animate-fade">
        <div class="mb-8">
            <h1 class="text-5xl font-['Cinzel'] text-yellow-500 mb-2 tracking-widest">ROYAL SALAMI</h1>
            <p class="text-gray-400 uppercase tracking-[0.3em] text-xs">Eid-ul-Fitr Special</p>
        </div>
        <div class="w-full max-w-sm bg-[#111] p-8 rounded-3xl border border-white/5 shadow-2xl">
            <input id="userName" type="text" placeholder="আপনার নাম লিখুন..." 
                class="w-full bg-black/50 border border-white/10 p-4 rounded-xl mb-6 text-center outline-none focus:border-yellow-600 transition-all text-xl">
            <button onclick="goToStep2()" class="w-full bg-yellow-600 hover:bg-yellow-500 text-black font-bold py-4 rounded-xl transition-all shadow-[0_0_20px_rgba(202,138,4,0.3)]">
                সালামি সংগ্রহ করুন ⮕
            </button>
        </div>
    </section>

    <section id="step-2" class="hidden h-screen flex flex-col items-center justify-center p-6 animate-slide">
        <h2 class="text-2xl mb-10 text-yellow-500/80 italic">আপনার ভাগ্য পরীক্ষা হচ্ছে...</h2>
        <div class="slot-container relative">
            <div class="slot-window flex gap-2 p-4 bg-[#111] border-[5px] border-yellow-700 rounded-3xl shadow-[0_0_50px_rgba(0,0,0,1)]">
                <div class="slot-reel" id="reel1"></div>
                <div class="slot-reel" id="reel2"></div>
                <div class="slot-reel" id="reel3"></div>
            </div>
            <div class="slot-line"></div>
        </div>
    </section>

    <section id="step-3" class="hidden h-screen flex flex-col items-center justify-center p-6 text-center animate-zoom">
        <div id="hadiya-card" class="w-full max-w-sm bg-gradient-to-b from-[#1a1a1a] to-[#0a0a0a] p-10 rounded-[40px] border border-yellow-500/20 shadow-2xl relative overflow-hidden">
            <div class="absolute top-[-20%] left-[-20%] w-64 h-64 bg-yellow-600/5 blur-[80px] rounded-full"></div>
            
            <h3 class="text-yellow-500 font-['Cinzel'] text-sm tracking-widest mb-6 uppercase">Official Hadiya Receipt</h3>
            <p class="text-gray-400 text-lg mb-2">ঈদ মোবারক,</p>
            <h2 id="finalName" class="text-3xl font-bold mb-8 text-white tracking-wide"></h2>
            
            <div class="bg-black/40 py-8 rounded-3xl border border-white/5 mb-8">
                <span class="text-xs text-yellow-600 block mb-1 uppercase tracking-widest font-bold">প্রাপ্ত সালামি</span>
                <div class="text-7xl font-['Bebas_Neue'] text-white">৳ <span id="finalAmount">0</span></div>
            </div>

            <p id="wishText" class="text-gray-300 italic leading-relaxed text-sm"></p>
            
            <button onclick="location.reload()" class="mt-10 text-xs text-yellow-600/50 hover:text-yellow-500 underline uppercase tracking-widest">আবার শুরু করুন</button>
        </div>
    </section>

</body>
</html>
