<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Royal Eid Hadiya 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Hind+Siliguri:wght@400;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#020a09] text-white font-['Hind_Siliguri'] overflow-hidden">

    <section id="step-1" class="h-screen flex flex-col items-center justify-center p-6 text-center animate-fade">
        <h1 class="text-4xl font-['Cinzel'] text-emerald-500 mb-10 tracking-widest uppercase">The Royal Salami</h1>
        <div class="w-full max-w-sm bg-[#0a1614] p-8 rounded-[40px] border border-emerald-500/20 shadow-2xl">
            <input id="userName" type="text" placeholder="আপনার নাম..." 
                class="w-full bg-black/40 border border-emerald-500/10 p-5 rounded-2xl mb-6 text-center outline-none focus:border-emerald-500 transition-all text-xl text-emerald-100">
            <button onclick="goToStep2()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-5 rounded-2xl transition-all shadow-[0_10px_30px_rgba(16,185,129,0.2)]">
                পরবর্তী ধাপ ⮕
            </button>
        </div>
    </section>

    <section id="step-2" class="hidden h-screen flex flex-col items-center justify-center p-6 text-center animate-slide">
        <h2 class="text-2xl text-emerald-400 mb-8 italic">আপনার জেলা কোনটি?</h2>
        <div class="w-full max-w-sm bg-[#0a1614] p-8 rounded-[40px] border border-emerald-500/20 shadow-2xl">
            <select id="districtSelect" class="w-full bg-black/40 border border-emerald-500/10 p-5 rounded-2xl mb-6 text-center outline-none focus:border-emerald-500 text-lg text-emerald-100 appearance-none">
                <option value="">-- জেলা নির্বাচন করুন --</option>
                <option value="Dhaka">ঢাকা</option>
                <option value="Chattogram">চট্টগ্রাম</option>
                <option value="Sylhet">সিলেট</option>
                <option value="Barishal">বরিশাল</option>
                <option value="Khulna">খুলনা</option>
                <option value="Rajshahi">রাজশাহী</option>
                <option value="Noakhali">নোয়াখালী</option>
                </select>
            <button onclick="goToStep3()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-5 rounded-2xl transition-all shadow-[0_10px_30px_rgba(16,185,129,0.2)]">
                স্লট স্পিন করুন 🎰
            </button>
        </div>
    </section>

    <section id="step-3" class="hidden h-screen flex flex-col items-center justify-center p-6 animate-slide">
        <div class="slot-container relative p-4 bg-gradient-to-b from-[#0f1f1c] to-[#050c0b] rounded-[50px] border-[6px] border-[#1a3a33] shadow-2xl">
            <div class="slot-window flex gap-3 p-6 bg-black rounded-[35px] overflow-hidden relative">
                <div class="absolute inset-0 z-10 pointer-events-none shadow-[inset_0_0_50px_rgba(0,0,0,0.9)]"></div>
                <div class="slot-reel" id="reel1"></div>
                <div class="slot-reel" id="reel2"></div>
                <div class="slot-reel" id="reel3"></div>
            </div>
        </div>
        <p class="mt-8 text-emerald-500/50 animate-pulse tracking-[4px] uppercase text-xs">Processing Hadiya...</p>
    </section>

    <section id="step-4" class="hidden h-screen flex flex-col items-center justify-center p-6 text-center animate-zoom">
        <div class="w-full max-w-sm bg-gradient-to-b from-[#0a1f1b] to-[#020a09] p-10 rounded-[50px] border-2 border-emerald-500/10 shadow-2xl relative">
            <div class="absolute -top-12 left-1/2 -translate-x-1/2 w-24 h-24 bg-emerald-500 rounded-full flex items-center justify-center shadow-xl border-8 border-[#020a09]">
                <span class="text-3xl">🌙</span>
            </div>
            
            <h3 class="text-emerald-500 font-['Cinzel'] text-xs tracking-[5px] mb-8 mt-6 uppercase font-bold">Official Eid Receipt</h3>
            
            <div class="mb-8">
                <p id="finalName" class="text-2xl font-bold text-white mb-1"></p>
                <p id="finalDistrict" class="text-emerald-500/60 text-sm"></p>
            </div>
            
            <div class="bg-black/40 py-8 rounded-[30px] border border-emerald-500/5 mb-8">
                <div class="text-7xl font-['Bebas_Neue'] text-emerald-400">৳ <span id="finalAmount">0</span></div>
                <span class="text-[10px] text-gray-500 uppercase tracking-widest mt-2 block">Amount Disbursed</span>
            </div>

            <p id="wishText" class="text-gray-300 italic text-sm leading-relaxed px-4"></p>
            
            <button onclick="location.reload()" class="mt-10 w-full py-4 rounded-xl border border-emerald-500/20 text-emerald-500 text-xs tracking-widest uppercase hover:bg-emerald-500/10 transition-all">নতুন করে নিন</button>
        </div>
    </section>

</body>
</html>
