<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Eid Salami Machine</title>

<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: "Hind Siliguri", sans-serif;
  background: #05060f;
  color: #fff;
  overflow-x: hidden;
}

.section {
  height: 100vh;
  width: 100%;
  padding: 30px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  transition: opacity .6s ease, transform .6s ease;
}

.hidden {
  opacity: 0;
  pointer-events: none;
  transform: translateY(40px);
}

.visible {
  opacity: 1;
  pointer-events: auto;
  transform: translateY(0);
}

.btn {
  background: linear-gradient(135deg, #00ffd1, #00aaff);
  padding: 14px 28px;
  border-radius: 14px;
  border: none;
  color: #000;
  font-weight: 700;
  font-size: 16px;
  margin-top: 20px;
  cursor: pointer;
  box-shadow: 0 0 25px rgba(0,255,209,0.4);
  transition: .2s;
}
.btn:hover {
  transform: translateY(-3px);
  box-shadow: 0 0 35px rgba(0,255,209,0.6);
}

input {
  width: 80%;
  padding: 14px;
  border-radius: 12px;
  border: 1px solid #333;
  background: rgba(255,255,255,0.05);
  color: #fff;
  font-size: 16px;
  margin-top: 20px;
  outline: none;
  text-align: center;
}

.slot-box {
  width: 260px;
  height: 120px;
  border-radius: 18px;
  background: linear-gradient(145deg, #0b0d18, #05060f);
  border: 1px solid rgba(255,255,255,0.1);
  overflow: hidden;
  position: relative;
  box-shadow: 0 0 40px rgba(0,255,209,0.2);
}

.slot-strip {
  position: absolute;
  width: 100%;
  top: -600px;
  transition: transform 1.4s cubic-bezier(.15,.8,.25,1);
}

.slot-num {
  font-size: 48px;
  font-weight: 700;
  padding: 20px 0;
  color: #00ffd1;
  text-shadow: 0 0 20px rgba(0,255,209,0.8);
}

.result-box {
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 16px;
  width: 85%;
  margin-top: 20px;
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.1);
}
</style>
</head>

<body>

<!-- STEP 1 -->
<div id="step1" class="section visible">
  <h1 style="font-size:32px; font-weight:700;">তোমার নাম লিখো</h1>
  <input id="nameInput" placeholder="উদাহরণ: আরাফাত, সাদিয়া">
  <button class="btn" onclick="goStep2()">Next →</button>
</div>

<!-- STEP 2 -->
<div id="step2" class="section hidden">
  <h1 style="font-size:30px; font-weight:700;">Spin Your Salami 🎰</h1>

  <div class="slot-box">
    <div id="slotStrip" class="slot-strip">
      <div class="slot-num">07</div>
      <div class="slot-num">23</div>
      <div class="slot-num">45</div>
      <div class="slot-num">62</div>
      <div class="slot-num">89</div>
      <div class="slot-num" id="finalNum">00</div>
    </div>
  </div>

  <button class="btn" onclick="spin()">Spin Now</button>
</div>

<!-- STEP 3 -->
<div id="step3" class="section hidden">
  <h1 style="font-size:30px; font-weight:700;">তোমার Salami Result</h1>

  <div class="result-box">
    <h2 id="resultAmount" style="font-size:40px; margin:0;">৳00</h2>
    <p id="resultWish" style="margin-top:10px; font-size:18px; line-height:1.6;"></p>
  </div>

  <button class="btn" onclick="restart()">Spin Again</button>
</div>

<script>
const step1 = document.getElementById("step1");
const step2 = document.getElementById("step2");
const step3 = document.getElementById("step3");

function goStep2() {
  const name = document.getElementById("nameInput").value.trim();
  if (!name) return alert("আগে নাম লিখো!");

  step1.classList.add("hidden");
  setTimeout(() => {
    step1.classList.remove("visible");
    step2.classList.add("visible");
    step2.classList.remove("hidden");
  }, 300);
}

function spin() {
  const amount = Math.floor(Math.random() * 100) + 1;
  const strip = document.getElementById("slotStrip");
  const finalNum = document.getElementById("finalNum");

  finalNum.textContent = amount.toString().padStart(2, "0");

  strip.style.transform = "translateY(600px)";

  setTimeout(() => {
    goStep3(amount);
  }, 1500);
}

function goStep3(amount) {
  step2.classList.add("hidden");
  setTimeout(() => {
    step2.classList.remove("visible");
    step3.classList.add("visible");
    step3.classList.remove("hidden");
  }, 300);

  const name = document.getElementById("nameInput").value.trim();
  document.getElementById("resultAmount").textContent = "৳" + amount;

  const wishes = [
    `প্রিয় ${name}, আজকের premium salami হলো ৳${amount} — আল্লাহ তোমার জীবনে শান্তি আর বরকত বাড়িয়ে দিন।`,
    `${name}, তোমার Eid pocket officially upgrade! আজকের salami: ৳${amount} — হাসিখুশি থেকো সবসময়।`,
    `${name}, আজকের spin এ তুমি পেয়েছো ৳${amount} — তোমার সব ইচ্ছা পূরণ হোক ইনশাআল্লাহ।`
  ];

  document.getElementById("resultWish").textContent =
    wishes[Math.floor(Math.random() * wishes.length)];
}

function restart() {
  location.reload();
}
</script>

</body>
</html>
